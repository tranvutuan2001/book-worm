prometheus:
  prometheusSpec:
    resources:
      requests:
        memory: "1Gi"
      limits:
        memory: "4Gi"
    # Reduce retention to save space/memory
    retention: 1d
    retentionSize: "2GB"

grafana:
  resources:
    limits:
      memory: "512Mi"
  adminPassword: "admin1234"

# Disable components that might overwhelm 1GB nodes
alertmanager:
  enabled: true
  templateFiles: {}